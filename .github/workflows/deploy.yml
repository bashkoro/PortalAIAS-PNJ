name: Deploy Laravel to cPanel

on:
  push:
    branches:
      - main # Ubah jika branch utamamu bernama 'master'

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v3

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /public_html/aiscore.bijak-ai.web.id/ # Sesuaikan dengan folder root domainmu di cPanel
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          .env.example